#
server:
  port: 8085
  servlet:
    context-path: /api/v1
  http2:
    enabled: true
#
spring:
  #
#  config:
#    activate:
#      on-profile: default

  application:
    name: sb-resource-server
    instance-id: global
  output.ansi.enabled: ALWAYS

  devtools:
    livereload:
      enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://login.microsoftonline.com/da5ac8f7-13d6-46e7-815d-012b01123148/discovery/v2.0/keys
          issuer-uri: https://sts.windows.net/da5ac8f7-13d6-46e7-815d-012b01123148/
          audiences: api://7f1cf4d7-ca24-47c2-bf17-61a8a796679e

  #
  datasource:
    name: SANDBOXDB
    username: sa
    password: sa
    driverClassName: org.h2.Driver
    jdbcUrl: jdbc:h2:mem:${spring.application.name}-DC-R0;DB_CLOSE_DELAY=-1;mode=mysql;
    #jdbcUrl: jdbc:h2:file:/apps/sandbox/h2/${spring.application.name}-DC-R0;mode=mysql;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1;
    hikari:
      pool-name: default
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 60000
      connection-timeout: 30000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      auto-commit: true
    region1:
      jdbcUrl: jdbc:h2:mem:${spring.application.name}-DC-R1;mode=mysql;DB_CLOSE_DELAY=-1;
      #jdbcUrl: jdbc:h2:file:/apps/sandbox/h2/${spring.application.name}-DC-R1;mode=mysql;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1;
      username: sa
      password: sa
      driverClassName: org.h2.Driver
      hikari:
        pool-name: region1
        maximum-pool-size: 10
        minimum-idle: 2
        idle-timeout: 60000
        connection-timeout: 30000
        max-lifetime: 1800000
        connection-test-query: SELECT 1
        auto-commit: true
    region2:
      jdbcUrl: jdbc:h2:mem:${spring.application.name}-DC-R2;mode=mysql;DB_CLOSE_DELAY=-1;
      #jdbcUrl: jdbc:h2:file:/apps/sandbox/h2/${spring.application.name}-DC-R2;mode=mysql;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1;
      username: sa
      password: sa
      driverClassName: org.h2.Driver
      hikari:
        pool-name: region2
        maximum-pool-size: 10
        minimum-idle: 2
        idle-timeout: 60000
        connection-timeout: 30000
        max-lifetime: 1800000
        connection-test-query: SELECT 1
        auto-commit: true
  #
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: true
  #
  #  sql:
  #    init:
  #      mode: always
  #      schema-locations: classpath*:schema.sql
  #      data-locations: classpath*:data.sql

  jpa:
    # database-platform: org.hibernate.dialect.MySQLDialect
    # database-platform: org.hibernate.dialect.MySQL8Dialect
    # database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
      use-new-id-gnerator-mappings: false
      dialect: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        show-sql: true
        use-sql-comments: true
        format-sql: true
        type: info
  #
  liquibase:
    enabled: true
    change-log: classpath:liquibase/${spring.application.instance-id}/master.yml
    contexts: h2
    parameters:
      textColumnType: TEXT
  #
  cache:
    jcache:
      config: classpath:ehcache.xml
  #
  kafka:
    transaction-topic: transaction-avro-topic
    bootstrap-servers:
      - kafkabroker.sandbox.net:9092
    properties:
      # Schema Registry Connection parameter
      schema.registry.url: http://schemaregistry.sandbox.net:8081
      schema.registry.ssl.keystore.location: /apps/security/ssl/clients.keystore.jks
      schema.registry.ssl.keystore.password: confluent
      schema.registry.ssl.key.password: confluent
      schema.registry.ssl.keystore.type: JKS
      schema.registry.ssl.truststore.location: /apps/security/ssl/clients.truststore.jks
      schema.registry.ssl.truststore.password: confluent
    consumer:
      properties:
        specific.avro.reader: false
        # spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        # spring.deserializer.value.delegate.class: io.confluent.kafka.serializers.KafkaAvroDeserializer
      group-id: sb-sandbox-cg
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      #value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
      interceptor.classes: io.confluent.monitoring.clients.interceptor.MonitoringConsumerInterceptor
    producer:
      #properties:
      #  allow.auto.create.topics: false
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      interceptor.classes: io.confluent.monitoring.clients.interceptor.MonitoringProducerInterceptor

# Eureka discovery client config
eureka:
  client:
    serviceUrl:
      defaultZone: http://sb-discovery-service:8761/eureka
    fetchRegistry: true
    registerWithEureka: true
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}-${spring.application.instance-id}
    lease-expiration-duration-in-seconds: 30
    lease-renewal-interval-in-seconds: 10

#
management:
  endpoints:
    web:
      exposure:
        include: "*"
    jmx:
      exposure:
        include: "*"
    access:
      default: READ_ONLY
  endpoint:
    info:
      access: READ_ONLY

#
logging:
  level:
    root: INFO
    reactor.netty.http.client: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
    org.springframework.kafka: error
    org.springframework.transaction: trace