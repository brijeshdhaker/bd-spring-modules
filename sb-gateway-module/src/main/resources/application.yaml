#
server:
  port: 8100

#  
spring:
  application:
    name: sb-gateway-module
    instance-id: global
  output.ansi.enabled: ALWAYS
#
  autoconfigure:
    # TODO: remove when fixed https://github.com/spring-projects/spring-security/issues/6314
    exclude: org.springframework.boot.actuate.autoconfigure.security.reactive.ReactiveManagementWebSecurityAutoConfiguration
  thymeleaf:
    cache: false
#
  security:
    oauth2:
      resourceserver:
        id: sb-gateway-module
        jwk:
          jwk-set-uri: https://login.microsoftonline.com/common/discovery/v2.0/keys
        jwt:
          issuer-uri: https://sts.windows.net/da5ac8f7-13d6-46e7-815d-012b01123148/
          audiences: api://7f1cf4d7-ca24-47c2-bf17-61a8a796679e
#      #
#      client:
#        provider:
#          azure:
#            issuer-uri: https://login.microsoftonline.com/da5ac8f7-13d6-46e7-815d-012b01123148/v2.0
#            token-uri: https://login.microsoftonline.com/da5ac8f7-13d6-46e7-815d-012b01123148/oauth2/v2.0/token
#            jwk-set-uri: https://login.microsoftonline.com/da5ac8f7-13d6-46e7-815d-012b01123148/discovery/v2.0/keys
#            #user-info-uri: https://graph.microsoft.com/v1.0/me
#            user-name-attribute: name
#        # {registrationId} http://localhost:8100/login/oauth2/code/azure-dev
#        registration:
#          azure-dev:
#            provider: azure
#            client-id: c5c062d8-4fe2-4319-9897-a59e57ed7ad2
#            client-secret: fXo8Q~qQgHPaJtyViMQMM_PQxSsRAN6uvqPTtdia
#            redirect-uri-template: "{baseUrl}/login/oauth2/code/{registrationId}"
#            authorization-grant-type: authorization_code
#            scope:
#              - openid
#              - email
#              - profile
#              - User.Read
#
  cloud:
    gateway:
      routes:
        #
        - id: sb-backend-module-r1
          uri: lb://SB-BACKEND-MODULE-R1
          predicates:
            - Path=/api/v1/**
            - Header=X-Tenant-Id, DC-R1
          filters:
            - RewritePath=/api/v1/?(?<segment>.*), /api/v1/r1/$\{segment}
            - AddRequestParameter=src, gw
#            - PrefixPath=/r1
        #
        - id: sb-backend-module-r2
          uri: lb://SB-BACKEND-MODULE-R2
          predicates:
            - Path=/api/v1/**
            - Header=X-Tenant-Id, DC-R2
          filters:
            - RewritePath=/api/v1/?(?<segment>.*), /api/v1/r2/$\{segment}
            - AddRequestParameter=src, gw
#            - StripPrefix=2
#            - PrefixPath=/r1
#            - RedirectTo=302, https://acme.org, true
#            - AddRequestHeader=X-Tenant-Id, DC-R2

        #
        - id: sb-backend-module-r0
          uri: lb://SB-BACKEND-MODULE-R0
          predicates:
            - Path=/api/v1/**
          filters:
            - AddRequestParameter=src, gw
            - AddRequestHeadersIfNotPresent=X-Tenant-Id:DC-R0
        #
        - id: sb-frontend-module
          uri: lb://SB-FRONTEND-MODULE
          predicates:
            - Path=/web/**

        #
        - id: no-service
          uri: lb://NO-SERVICE
          predicates:
            - Path=/api/v1/no-service/**
            
#        - id: resource
#          uri: http://localhost:8100
#          predicates:
#            - Path=/resource
#          filters:
#            - TokenRelay=azure-dev

# Eureka discovery client config
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}-${spring.application.instance-id}
    lease-expiration-duration-in-seconds: 30
    lease-renewal-interval-in-seconds: 10

#
management:
  endpoints:
    web:
      exposure:
        include: "*"

#
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: TRACE
    reactor.netty.http.client: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.springframework.security.oauth2: INFO